<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Chat</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: #0b0c0f; color: #e6e6e6; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    .card { background: #121417; border: 1px solid #1e2126; border-radius: 12px; padding: 20px; }
    .title { font-size: 20px; font-weight: 600; margin: 0 0 12px; }
    .row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .row .grow { flex: 1; }
    textarea { width: 100%; min-height: 100px; border-radius: 8px; border: 1px solid #2a2f36; background: #0f1114; color: #e6e6e6; padding: 12px; resize: vertical; outline: none; }
    textarea:focus { border-color: #4a90e2; }
    .btn { appearance: none; border: 1px solid #2a2f36; background: #0f1114; color: #e6e6e6; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn.primary { background: #2563eb; border-color: #2563eb; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { font-size: 12px; color: #9aa3af; }
    .output { margin-top: 12px; border: 1px solid #2a2f36; background: #0f1114; border-radius: 8px; padding: 12px; max-height: 60vh; overflow: auto; }
    .output pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; line-height: 1.6; }
    .actions { display: flex; gap: 8px; align-items: center; }
    .footer { margin-top: 16px; font-size: 12px; color: #9aa3af; }
    .input-label { font-size: 14px; color: #cbd5e1; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="title">流式聊天</div>
      <div class="input-label">选择 Prompt 示例</div>
      <div class="row">
        <select id="apiSelect" class="grow" style="padding: 12px; border-radius: 8px; border: 1px solid #2a2f36; background: #0f1114; color: #e6e6e6; outline: none; font-family: inherit; cursor: pointer;">
            <option value="/api/chat">1. 普通助手</option>
            <option value="/ai/prompt/chat">2. 预设角色 (毒舌博主)</option>
            <option value="/ai/prompt/chat2">3. Few-Shot 推理 (数字转换)</option>
            <option value="/ai/prompt/shot">4. 输出结构化 (文本改写)</option>
            <option value="/ai/prompt/promptsEngineer3">5. 角色扮演与结构化 (书籍JSON)</option>
            <option value="/ai/prompt/chat4">6. 复杂任务分解 (多步操作)</option>
             <option value="/ai/prompt/chat5">7. 思维链 (数学推理)</option>
              <option value="/ai/prompt/template">8. 提示词模板 (动态文案)</option>
              <option value="/ai/memory/chat">9. 多轮对话记忆 (手动维护)</option>
               <option value="/ai/memory/advisor">10. 自动化 Advisor 记忆 (推荐方式)</option>
           </select>
      </div>
      <div class="input-label">输入内容</div>
      <textarea id="prompt" placeholder="输入你的问题或需求"></textarea>
      <div class="row">
        <div class="actions">
          <button class="btn primary" id="start">开始</button>
          <button class="btn" id="stop">停止</button>
          <button class="btn" id="clear">清空</button>
          <button class="btn" id="copy">复制</button>
        </div>
        <div class="grow"></div>
        <div class="status" id="status">空闲</div>
      </div>
      <div class="output">
        <pre id="output"></pre>
      </div>
      <div class="footer">接口: /api/chat?prompt=...</div>
    </div>
  </div>
  <script>
    const promptEl = document.getElementById('prompt');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const clearBtn = document.getElementById('clear');
    const copyBtn = document.getElementById('copy');
    let es = null;
    let buffer = '';
    function setStatus(t) { statusEl.textContent = t; }
    function start() {
      if (es) es.close();
      buffer = '';
      outputEl.textContent = '';
      const p = promptEl.value.trim();
      if (!p) return;
      setStatus('连接中...');
      startBtn.disabled = true;
      stopBtn.disabled = false;
      const apiSelect = document.getElementById('apiSelect');
      const selectedApi = apiSelect.value;
        const paramName = ['/ai/prompt/shot', '/ai/prompt/chat', '/ai/prompt/chat2', '/ai/prompt/promptsEngineer3', '/ai/prompt/chat4', '/ai/prompt/chat5', '/ai/prompt/template', '/ai/memory/chat', '/ai/memory/advisor'].includes(selectedApi) ? 'message' : 'prompt';
      const url = `${selectedApi}?${paramName}=${encodeURIComponent(p)}`;
      es = new EventSource(url);
      es.onopen = () => setStatus('流式输出中');
      es.onmessage = (e) => {
        buffer += e.data;
        outputEl.textContent = buffer;
        const o = outputEl.parentElement;
        o.scrollTop = o.scrollHeight;
      };
      es.onerror = () => {
        stop();
        setStatus('连接断开');
      };
    }
    function stop() {
      if (es) { es.close(); es = null; }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      setStatus('空闲');
    }
    function clearOutput() {
      buffer = '';
      outputEl.textContent = '';
    }
    async function copyOutput() {
      const t = outputEl.textContent;
      if (!t) return;
      try { await navigator.clipboard.writeText(t); setStatus('已复制'); } catch {}
    }
    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
    clearBtn.addEventListener('click', clearOutput);
    copyBtn.addEventListener('click', copyOutput);
  </script>
</body>
</html>
